name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Normalize npm registry in lockfile
        run: |
          node -e "const fs=require('fs');const p='package-lock.json';const s=fs.readFileSync(p,'utf8');const out=s.replaceAll('https://registry.npmmirror.com/','https://registry.npmjs.org/');if(out!==s){fs.writeFileSync(p,out);console.log('Rewrote package-lock.json resolved URLs to registry.npmjs.org');}else{console.log('No npmmirror URLs found in lockfile');}"

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org --location=project
          npm config set fetch-retries 5 --location=project
          npm config set fetch-retry-mintimeout 20000 --location=project
          npm config set fetch-retry-maxtimeout 120000 --location=project
          npm config set fetch-timeout 300000 --location=project
          npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
